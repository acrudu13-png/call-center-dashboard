version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: callcenter_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-callcenter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-callcenter_secret}
      POSTGRES_DB: ${POSTGRES_DB:-callcenter}
      TZ: ${TZ:-Europe/Bucharest}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-callcenter}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────
  api:
    build: ./backend
    container_name: callcenter_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-callcenter}:${POSTGRES_PASSWORD:-callcenter_secret}@db:5432/${POSTGRES_DB:-callcenter}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_MINUTES: ${JWT_ACCESS_MINUTES:-60}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-7}
      DEFAULT_ADMIN_USER: ${DEFAULT_ADMIN_USER:-admin}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@callqa.local}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      SONIOX_API_KEY: ${SONIOX_API_KEY:-}
      SFTP_HOST: ${SFTP_HOST:-}
      SFTP_PORT: ${SFTP_PORT:-22}
      SFTP_USERNAME: ${SFTP_USERNAME:-}
      SFTP_PASSWORD: ${SFTP_PASSWORD:-}
      SFTP_REMOTE_PATH: ${SFTP_REMOTE_PATH:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-eu-central-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_PREFIX: ${S3_PREFIX:-raw-audio/}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_ENABLED: ${WEBHOOK_ENABLED:-true}
      WEBHOOK_RETRY_COUNT: ${WEBHOOK_RETRY_COUNT:-3}
      INGEST_CRON_HOUR: ${INGEST_CRON_HOUR:-6}
      INGEST_ENABLED: ${INGEST_ENABLED:-true}
      CORS_ORIGINS: '["http://${SERVER_HOST:-localhost}","https://${SERVER_HOST:-localhost}","http://${SERVER_HOST:-localhost}:${FRONTEND_PORT:-3456}","http://localhost:${FRONTEND_PORT:-3456}","http://frontend:3000"]'
      TZ: ${TZ:-Europe/Bucharest}
    ports:
      - "${BACKEND_PORT:-3457}:${BACKEND_PORT:-3457}"
    volumes:
      - ./backend/app:/code/app
      - ./backend/alembic:/code/alembic
      - ./backend/alembic.ini:/code/alembic.ini
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${BACKEND_PORT:-3457} --reload"

  # ── Next.js Frontend ─────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://${SERVER_HOST:-localhost}:${BACKEND_PORT:-3457}}
        NEXT_PUBLIC_WS_URL: ${WS_URL:-ws://${SERVER_HOST:-localhost}:${BACKEND_PORT:-3457}/ws}
    container_name: callcenter_frontend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/Bucharest}
    ports:
      - "${FRONTEND_PORT:-3456}:3000"
    depends_on:
      - api

volumes:
  pgdata:
